<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Đăng nhập - iFinance</title>
  <link rel="stylesheet" href="../css/main.css">
  <style>
    .login-container {
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 20px;
    }

    .login-card {
      background: var(--dark-bg);
      border-radius: 16px;
      padding: 48px;
      max-width: 420px;
      width: 100%;
      box-shadow: var(--shadow-lg);
    }

    .login-header {
      text-align: center;
      margin-bottom: 32px;
    }

    .login-title {
      font-size: 32px;
      font-weight: 700;
      background: linear-gradient(135deg, var(--primary-color), var(--primary-light));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 8px;
    }

    .login-subtitle {
      color: var(--dark-text-secondary);
      font-size: 14px;
    }

    .login-form {
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .login-btn {
      width: 100%;
      padding: 14px;
      font-size: 16px;
      margin-top: 8px;
    }
  </style>
</head>
<body>
  <div class="login-container">
    <div class="login-card">
      <div class="login-header">
        <h1 class="login-title">iFinance</h1>
        <p class="login-subtitle">Hệ thống quản lý thu chi thông minh</p>
      </div>

      <div id="error-message"></div>

      <form id="loginForm" class="login-form">
        <div class="form-group">
          <label for="username">Tên đăng nhập</label>
          <input type="text" id="username" name="username" required autocomplete="username">
        </div>

        <div class="form-group">
          <label for="password">Mật khẩu</label>
          <input type="password" id="password" name="password" required autocomplete="current-password">
        </div>

        <button type="submit" class="btn-primary login-btn">Đăng nhập</button>
      </form>

      <div style="margin-top: 24px; text-align: center; color: var(--dark-text-secondary); font-size: 12px;">
        <p>Tài khoản mặc định: admin / admin123</p>
      </div>
    </div>
  </div>

  <script src="../js/api.js"></script>
  <script>
    const loginForm = document.getElementById('loginForm');
    const errorMessage = document.getElementById('error-message');

    loginForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      errorMessage.innerHTML = '';

      const username = document.getElementById('username').value;
      const password = document.getElementById('password').value;

      try {
        const loginBtn = loginForm.querySelector('button');
        loginBtn.disabled = true;
        loginBtn.textContent = 'Đang đăng nhập...';

        await api.login(username, password);
        
        window.electronAPI.navigate('dashboard');
      } catch (error) {
        errorMessage.innerHTML = `<div class="alert alert-danger">${error.message}</div>`;
        loginForm.querySelector('button').disabled = false;
        loginForm.querySelector('button').textContent = 'Đăng nhập';
      }
    });
  </script>
</body>
</html>
