<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - iFinance</title>
    <link rel="stylesheet" href="../css/main.css">
    <style>
        .layout {
            display: flex;
            min-height: 100vh;
        }

        .sidebar {
            width: 250px;
            background: var(--dark-bg);
            padding: 20px;
            box-shadow: 2px 0 10px rgba(0, 0, 0, 0.1);
        }

        .logo {
            font-size: 24px;
            font-weight: 700;
            background: linear-gradient(135deg, var(--primary-color), var(--primary-light));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 32px;
            text-align: center;
        }

        .nav-menu {
            list-style: none;
        }

        .nav-item {
            margin-bottom: 8px;
        }

        .nav-link {
            display: block;
            padding: 12px 16px;
            color: var(--dark-text-secondary);
            text-decoration: none;
            border-radius: 8px;
            transition: all 0.3s ease;
        }

        .nav-link:hover,
        .nav-link.active {
            background: var(--primary-color);
            color: white;
        }

        .main-content {
            flex: 1;
            padding: 32px;
            background: var(--dark-bg-secondary);
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 32px;
        }

        .user-info {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 24px;
            margin-bottom: 32px;
        }

        .chart-container {
            background: var(--dark-bg);
            padding: 24px;
            border-radius: 12px;
            margin-bottom: 24px;
        }
    </style>
</head>

<body>
    <div class="layout">
        <aside class="sidebar">
            <div class="logo">iFinance</div>
            <ul class="nav-menu">
                <li class="nav-item">
                    <a href="#" class="nav-link active" onclick="loadPage('dashboard')">📊 Dashboard</a>
                </li>
                <li class="nav-item">
                    <a href="#" class="nav-link" onclick="loadPage('transactions')">💳 Giao dịch</a>
                </li>
                <li class="nav-item">
                    <a href="#" class="nav-link" onclick="loadPage('pending')">⏳ Chờ xác nhận</a>
                </li>
                <li class="nav-item">
                    <a href="#" class="nav-link" onclick="loadPage('reports')">📈 Báo cáo</a>
                </li>
                <li class="nav-item">
                    <a href="#" class="nav-link" onclick="loadPage('settings')">⚙️ Cài đặt</a>
                </li>
                <li class="nav-item" style="margin-top: 32px;">
                    <a href="#" class="nav-link" onclick="logout()">🚪 Đăng xuất</a>
                </li>
            </ul>
        </aside>

        <main class="main-content">
            <div class="header">
                <h1>Dashboard</h1>
                <div class="user-info">
                    <span id="username"></span>
                    <span class="badge badge-info" id="userRole"></span>
                </div>
            </div>

            <div class="stats-grid" id="statsGrid"></div>

            <div class="grid grid-2">
                <div class="card">
                    <div class="card-header">Giao dịch gần đây</div>
                    <div id="recentTransactions"></div>
                </div>

                <div class="card">
                    <div class="card-header">Cảnh báo bất thường</div>
                    <div id="anomalies"></div>
                </div>
            </div>
        </main>
    </div>

    <script src="../js/api.js"></script>
    <script>
        const user = getCurrentUser();
        if (!user) {
            window.electronAPI.navigate('login');
        }

        document.getElementById('username').textContent = user.username;
        document.getElementById('userRole').textContent = user.role;

        function loadPage(page) {
            window.electronAPI.navigate(page);
        }

        function logout() {
            api.clearToken();
            window.electronAPI.navigate('login');
        }

        async function loadDashboard() {
            try {
                const endDate = new Date().toISOString().split('T')[0];
                const startDate = new Date(Date.now() - 30 * 24 * 60 * 60 * 1000).toISOString().split('T')[0];

                const statsData = await api.getStats({ start_date: startDate, end_date: endDate });
                const recentData = await api.getTransactions({ limit: 5 });
                const anomaliesData = await api.getAnomalies({ start_date: startDate, end_date: endDate });

                displayStats(statsData);
                displayRecentTransactions(recentData.transactions);
                displayAnomalies(anomaliesData.anomalies);
            } catch (error) {
                console.error('Error loading dashboard:', error);
                showToast('Lỗi tải dữ liệu dashboard', 'danger');
            }
        }

        function displayStats(data) {
            const statsGrid = document.getElementById('statsGrid');

            const income = data.stats.find(s => s.type === 'income')?.total || 0;
            const expense = data.stats.find(s => s.type === 'expense')?.total || 0;
            const balance = income - expense;

            statsGrid.innerHTML = `
        <div class="stat-card income">
          <div class="stat-label">Tổng thu</div>
          <div class="stat-value">${formatCurrency(income)}</div>
        </div>
        <div class="stat-card expense">
          <div class="stat-label">Tổng chi</div>
          <div class="stat-value">${formatCurrency(expense)}</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">Số dư</div>
          <div class="stat-value">${formatCurrency(balance)}</div>
        </div>
      `;
        }

        function displayRecentTransactions(transactions) {
            const container = document.getElementById('recentTransactions');

            if (transactions.length === 0) {
                container.innerHTML = '<p style="text-align: center; color: var(--dark-text-secondary);">Chưa có giao dịch</p>';
                return;
            }

            container.innerHTML = `
        <table>
          <tbody>
            ${transactions.map(t => `
              <tr>
                <td>${formatDate(t.date)}</td>
                <td>${t.description}</td>
                <td style="color: ${t.type === 'income' ? 'var(--success-color)' : 'var(--danger-color)'}">
                  ${t.type === 'income' ? '+' : '-'}${formatCurrency(t.amount)}
                </td>
              </tr>
            `).join('')}
          </tbody>
        </table>
      `;
        }

        function displayAnomalies(anomalies) {
            const container = document.getElementById('anomalies');

            if (anomalies.length === 0) {
                container.innerHTML = '<p style="text-align: center; color: var(--success-color);">✓ Không có giao dịch bất thường</p>';
                return;
            }

            container.innerHTML = `
        <div>
          ${anomalies.slice(0, 5).map(a => `
            <div class="alert alert-warning" style="margin-bottom: 12px;">
              <strong>${formatDate(a.date)}</strong>: ${a.description}<br>
              <small>Số tiền: ${formatCurrency(a.amount)} - ${a.anomaly_reason}</small>
            </div>
          `).join('')}
        </div>
      `;
        }

        loadDashboard();
    </script>
</body>

</html>
